name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: macos-14
            target: aarch64-darwin
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build release binary
        run: nix build --print-build-logs

      - name: Package tarball + checksum
        run: |
          set -euo pipefail
          ref="${{ github.ref_name }}"
          name="nshell-${ref}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp result/bin/nshell "dist/${name}/"
          cp README.md LICENSE "dist/${name}/" 2>/dev/null || true
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
