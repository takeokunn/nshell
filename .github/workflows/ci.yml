name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: nix flake check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest   # x86_64-linux
          - os: macos-14        # aarch64-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build, test, and smoke-test (nix flake check)
        run: nix flake check --print-build-logs

  binary:
    name: build release binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build nshell binary
        run: nix build --print-build-logs

      - name: Verify binary starts
        run: |
          echo 'echo nshell-ci-ok' | ./result/bin/nshell | grep -q nshell-ci-ok
